services:
  php-cli:
    build:
      context: .
      dockerfile: docker/php/cli/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: digestpipe
      DB_USERNAME: digestpipe
      DB_PASSWORD: digestpipe
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: s3
      LOG_CHANNEL: stderr
      REDIS_CLIENT: phpredis
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: digestpipe-local
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://localhost:9000/digestpipe-local
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/fpm/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: digestpipe
      DB_USERNAME: digestpipe
      DB_PASSWORD: digestpipe
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: s3
      LOG_CHANNEL: stderr
      REDIS_CLIENT: phpredis
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: digestpipe-local
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://localhost:9000/digestpipe-local
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: digestpipe
      POSTGRES_USER: digestpipe
      POSTGRES_PASSWORD: digestpipe
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digestpipe -d digestpipe"]
      interval: 5s
      timeout: 5s
      retries: 12

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  minio-data:
